<section class="stammdaten-page">

    <h1>Stammdaten</h1>

    <div class="action-bar">

        <div class="search-group">

            <label for="sdWildgruppe">
                Wildgruppe
            </label>

            <select
                id="sdWildgruppe"
                class="search-select">
            </select>

        </div>

        <div class="btn-group">

            <button
                id="sdNeueKlasse"
                class="btn btn-primary">
                Neue Wildklasse
            </button>

        </div>

    </div>

    <table class="ap-table">

        <thead>

            <tr>
                <th style="width:90px;">Nr.</th>
                <th style="width:120px;">Code</th>
                <th>Bezeichnung</th>
                <th style="width:90px;">Aktiv</th>
                <th style="width:130px;">Aktionen</th>
            </tr>

        </thead>

        <tbody id="sdWildklassenBody"></tbody>

    </table>

</section>


<!-- ===================================================== -->
<!-- Modal Wildklasse                                      -->
<!-- ===================================================== -->

<div id="sdWildklasseModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="sdWildklasseTitel">
                Wildklasse
            </h2>

            <span
                id="sdSchliessen"
                class="close-btn">
                &times;
            </span>

        </div>

        <div class="form-grid">

            <div class="form-group">

                <label class="required">
                    Code
                </label>

                <input
                    id="sdCode"
                    class="form-control"
                    type="text"
                    maxlength="20"
                    style="text-transform: uppercase;">

            </div>

            <div class="form-group">

                <label class="required">
                    Bezeichnung
                </label>

                <input
                    id="sdBezeichnung"
                    class="form-control"
                    type="text">

            </div>

            <div class="form-group">

                <label>
                    Reihenfolge
                </label>

                <input
                    id="sdReihenfolge"
                    class="form-control"
                    type="number"
                    min="1">

            </div>

            <div class="form-group">

                <label>
                    Aktiv
                </label>

                <input
                    id="sdAktiv"
                    type="checkbox">

            </div>

        </div>

        <div class="modal-footer">

            <button
                id="sdSpeichern"
                class="btn btn-primary">
                Speichern
            </button>

            <button
                id="sdAbbrechen"
                class="btn btn-outline">
                Abbrechen
            </button>

        </div>

    </div>

</div>
