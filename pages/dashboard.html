<div class="page-shell">
  {{SIDEBAR}}

  <main class="page-main">
    <div class="container">
      <div class="topbar">
        <div>
          <h1 class="h1">Dashboard</h1>
          <p class="p">Session und API-Status für den laufenden Betrieb.</p>
        </div>

        <div class="topbar-actions">
          <span class="badge"><span class="badge-dot"></span> Eingeloggt</span>
        </div>
      </div>

      <section class="kpi-grid">
        <article class="card kpi">
          <div class="kpi-label">Benutzer</div>
          <div id="dashUserName" class="kpi-value">-</div>
          <div class="p">Aktive Benutzeridentität</div>
        </article>

        <article class="card kpi">
          <div class="kpi-label">Rolle</div>
          <div id="dashRole" class="kpi-value">-</div>
          <div class="p">Berechtigung aus der Benutzerverwaltung</div>
        </article>

        <article class="card kpi">
          <div class="kpi-label">Session</div>
          <div id="dashExpires" class="kpi-value">-</div>
          <div class="p">Ablaufzeit der aktuellen Sitzung</div>
        </article>
      </section>

      <div style="height:18px"></div>

      <section class="card card-pad">
        <div class="row">
          <h2 class="h2" style="margin:0">Technischer Status</h2>
          <span class="spacer"></span>
          <span class="badge">API bereit</span>
        </div>

        <div class="form-grid" style="margin-top:14px">
          <div class="field col-6">
            <label>API-URL</label>
            <div id="dashApi" class="input" style="display:flex;align-items:center;min-height:46px">-</div>
          </div>
          <div class="field col-6">
            <label>Session-Token (gekürzt)</label>
            <div id="dashToken" class="input" style="display:flex;align-items:center;min-height:46px">-</div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>
