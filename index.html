<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>DP Jagd</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div id="loading" role="status" aria-live="polite">DP Jagd wird gestartet...</div>

    <div id="app" hidden>
        <aside id="sidebar" aria-label="Hauptnavigation">
            <div class="logo">DP Jagd</div>
            <nav>
                <button type="button" data-page="dashboard">Dashboard</button>
                <button type="button" data-page="personen">Personen</button>
                <button type="button" data-page="abschuss">Abschuss</button>
                <button type="button" data-page="abschussplan">Abschussplan</button>
            </nav>
            <div class="sidebar-bottom">
                <button id="logoutButton" type="button">Abmelden</button>
            </div>
        </aside>

        <main>
            <header>
                <strong>DP Jagd</strong>
                <div>
                    <span class="header-user-label">Angemeldet als:</span>
                    <span id="currentUser">-</span>
                </div>
            </header>
            <section id="app-content" aria-live="polite"></section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script src="js/personen.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
