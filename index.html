<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>DP Jagd</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
    /* Mobile sidebar: overlay, toggle and slide-in behavior (overrides placed here to load last) */
    @media (max-width: 768px) {
        #app { position: relative; }
        #sidebar {
            position: fixed !important;
            left: 0;
            top: 0;
            height: 100vh !important;
            transform: translateX(-110%);
            transition: transform 280ms ease;
            z-index: 1100;
            box-shadow: 2px 0 12px rgba(0,0,0,0.18);
        }
        #sidebar.open { transform: translateX(0); }

        #sidebarOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            opacity: 0;
            visibility: hidden;
            transition: opacity 200ms ease, visibility 200ms ease;
            z-index: 1050;
        }
        #sidebarOverlay.open { opacity: 1; visibility: visible; }

        #sidebarToggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 0;
            font-size: 1.4rem;
            line-height: 1;
            padding: 6px 8px;
            margin-right: 8px;
            cursor: pointer;
            color: inherit;
        }
    }

    @media (min-width: 769px) {
        #sidebarToggle { display: none; }
        #sidebarOverlay { display: none !important; }
        #sidebar { position: static !important; transform: none !important; height: auto !important; box-shadow: none !important; }
    }
    </style>
</head>
<body>
    <div id="loading" role="status" aria-live="polite">DP Jagd wird gestartet...</div>

    <div id="app" hidden>
    <aside id="sidebar" aria-label="Hauptnavigation">
        <div class="logo">DP Jagd</div>

        <nav>
            <button type="button" data-page="dashboard">Dashboard</button>
            <button type="button" data-page="personen">Personen</button>
            <button type="button" data-page="abschuss">Abschuss</button>

            <div class="sidebar-group">
                <button
                    type="button"
                    class="sidebar-group-toggle"
                    data-toggle="submenu"
                    data-group="abschussplan"
                    aria-expanded="false">
                    Abschussplan
                </button>

                <div class="sidebar-submenu" data-group="abschussplan">
                    <button type="button" data-page="abschussplan" data-panel="ap-overview">Übersicht</button>
                    <button type="button" data-page="abschussplan" data-panel="ap-rotwild">Rotwild</button>
                    <button type="button" data-page="abschussplan" data-panel="ap-rehwild">Rehwild</button>
                    <button type="button" data-page="abschussplan" data-panel="ap-gamswild">Gamswild</button>
                    <button type="button" data-page="abschussplan" data-panel="ap-jahre">Übersicht Jahre</button>
                </div>
            </div>

            <div class="sidebar-group">
                <button
                    type="button"
                    class="sidebar-group-toggle"
                    data-toggle="submenu"
                    data-group="stammdaten"
                    aria-expanded="false">
                    Stammdaten
                </button>

                <div
                    class="sidebar-submenu"
                    data-group="stammdaten">

                    <button
                        type="button"
                        data-page="stammdaten">
                        Wildklassen
                    </button>

                </div>
            </div>

        </nav>

        <div class="sidebar-bottom">
            <button id="logoutButton" type="button">Abmelden</button>
        </div>
    </aside>

    <main>
        <header>
            <button id="sidebarToggle" aria-label="Menü" aria-expanded="false">☰</button>
            <strong>DP Jagd</strong>

            <div>
                <span class="header-user-label">Angemeldet als:</span>
                <span id="currentUser">-</span>
            </div>
        </header>

        <section id="app-content" aria-live="polite"></section>
    </main>
    </div>

    <div id="sidebarOverlay" aria-hidden="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/api.js"></script>
    <script src="js/personen.js"></script>
    <script src="js/services/abschussplanService.js"></script>
    <script src="js/abschussplanWildgruppe.js"></script>
    <script src="js/abschussplan.js"></script>
    <script src="js/services/wildklassenService.js"></script>
    <script src="js/stammdaten.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
